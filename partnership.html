<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partnerships — Rascal Festival</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .page-hero{min-height:40vh;display:flex;flex-direction:column;justify-content:flex-end;padding:80px 40px 60px;border-bottom:1px solid rgba(255,255,255,.06)}
    .page-hero .sl{justify-content:flex-start}
    .page-hero .sl::before{display:none}
    .page-content{max-width:760px;margin:0 auto;padding:64px 40px 100px}
    .placeholder{border:1px dashed rgba(170,255,0,.2);border-radius:16px;padding:60px 40px;text-align:center;margin-top:40px}
    .placeholder p{color:var(--grey);font-size:14px;font-weight:300}
    @media(max-width:600px){.page-hero,.page-content{padding-left:20px;padding-right:20px}}
  </style>
</head>
<body>
  <nav id="nav"><a href="/" class="nlogo">Rascal Festival</a></nav>

  <div class="page-hero">
    <div class="sl">Work With Us</div>
    <h1 class="sh" style="font-size:clamp(52px,8vw,100px);margin-bottom:0">PARTNER<br><span style="color:var(--green)">WITH US</span></h1>
  </div>

  <div class="page-content">
    <!-- Content coming soon -->
    <div class="placeholder">
      <p>Content coming soon.</p>
    </div>
  </div>

  <footer>
    <div class="foot-bot" style="border-top:1px solid rgba(255,255,255,.06)">
      <p>&#169; 2026 Rascal Festival&#8482;. All rights reserved.</p>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
